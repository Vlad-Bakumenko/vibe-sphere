# Local development database. Not used in production (Phase 6 provisions a
# managed Postgres). Bring it up with: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: vibesphere-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vibesphere
    ports:
      - '5432:5432'
    volumes:
      - vibesphere-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d vibesphere']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  vibesphere-pg-data:
