allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  # Optional native msgpack accelerator (transitive via uploadthing); the
  # pure-JS fallback is sufficient, so we skip the node-gyp build in CI.
  msgpackr-extract: false
  prisma: true
  sharp: true
  unrs-resolver: true
